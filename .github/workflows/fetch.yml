name: Hava verisi cek

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: fetch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Veriyi cek
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
        run: node fetch.js
      - name: Kaydet
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add data/data.json
          if git diff --staged --quiet; then
            echo "Degisiklik yok."
          else
            git commit -m "veri guncellendi"
            git push
          fi
