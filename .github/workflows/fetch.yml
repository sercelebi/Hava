name: Hava verisi çek

on:
  schedule:
    - cron: "*/10 * * * *"   # her 10 dakikada bir (UTC)
  workflow_dispatch:          # elle çalıştırmak için

concurrency:
  group: fetch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Veriyi çek
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
        run: node fetch.js

      - name: Değişiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          if git diff --staged --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "veri güncellendi: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
